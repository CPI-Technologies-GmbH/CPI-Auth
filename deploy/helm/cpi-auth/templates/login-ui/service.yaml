{{- if .Values.loginUI.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cpi-auth.fullname" . }}-login-ui
  labels:
    {{- include "cpi-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: login-ui
spec:
  type: ClusterIP
  ports:
    - port: 5053
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cpi-auth.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: login-ui
{{- end }}
