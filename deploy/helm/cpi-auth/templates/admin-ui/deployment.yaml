{{- if .Values.adminUI.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cpi-auth.fullname" . }}-admin-ui
  labels:
    {{- include "cpi-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin-ui
spec:
  replicas: {{ .Values.adminUI.replicas }}
  selector:
    matchLabels:
      {{- include "cpi-auth.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin-ui
  template:
    metadata:
      labels:
        {{- include "cpi-auth.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin-ui
    spec:
      serviceAccountName: {{ include "cpi-auth.serviceAccountName" . }}
      containers:
        - name: admin-ui
          image: "{{ .Values.adminUI.image.repository }}:{{ .Values.adminUI.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.adminUI.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5054
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.adminUI.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
