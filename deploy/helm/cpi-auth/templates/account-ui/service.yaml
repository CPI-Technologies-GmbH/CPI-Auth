{{- if .Values.accountUI.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cpi-auth.fullname" . }}-account-ui
  labels:
    {{- include "cpi-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: account-ui
spec:
  type: ClusterIP
  ports:
    - port: 5055
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cpi-auth.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: account-ui
{{- end }}
