{{- if and .Values.postgresql.enabled (not .Values.postgresql.external.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cpi-auth.fullname" . }}-postgresql
  labels:
    {{- include "cpi-auth.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
data:
  postgresql-password: {{ default (randAlphaNum 24) .Values.postgresql.auth.password | b64enc | quote }}
  {{- if .Values.postgresql.auth.postgresPassword }}
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | b64enc | quote }}
  {{- end }}
{{- end }}
