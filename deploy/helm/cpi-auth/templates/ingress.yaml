{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cpi-auth.fullname" . }}
  labels:
    {{- include "cpi-auth.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if or .Values.global.tls .Values.ingress.tls }}
  tls:
    {{- if .Values.ingress.tls }}
    {{- toYaml .Values.ingress.tls | nindent 4 }}
    {{- else }}
    - secretName: {{ include "cpi-auth.fullname" . }}-tls
      hosts:
        - {{ .Values.global.domain }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.global.domain | quote }}
      http:
        paths:
          {{- $coreSvc := printf "%s-core" (include "cpi-auth.fullname" .) }}
          {{- $uiSvc := printf "%s-admin-ui" (include "cpi-auth.fullname" .) }}
          {{- $loginSvc := printf "%s-login-ui" (include "cpi-auth.fullname" .) }}
          # Login UI routes (SvelteKit — handles OAuth login/consent flow)
          {{- range list "/login" "/register" "/consent" "/device" "/verify-email" "/forgot-password" "/reset-password" "/error" "/_app" }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $loginSvc }}
                port:
                  number: 5053
          {{- end }}
          # API routes → Core backend
          {{- range list "/admin" "/oauth" "/.well-known" "/api" "/passwordless" "/mfa" "/webauthn" "/saml" }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          {{- end }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $uiSvc }}
                port:
                  number: 5054
{{- end }}
