{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cpi-auth.fullname" . }}
  labels:
    {{- include "cpi-auth.labels" . | nindent 4 }}
  annotations:
    # Enable nginx-ingress regex paths so the /t/{slug}/(login|register|...)
    # routes below can capture the slug. The login UI's reroute hook strips
    # the prefix internally so SvelteKit's filesystem router still matches.
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if or .Values.global.tls .Values.ingress.tls }}
  tls:
    {{- if .Values.ingress.tls }}
    {{- toYaml .Values.ingress.tls | nindent 4 }}
    {{- else }}
    - secretName: {{ include "cpi-auth.fullname" . }}-tls
      hosts:
        - {{ .Values.global.domain }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.global.domain | quote }}
      http:
        paths:
          {{- $coreSvc := printf "%s-core" (include "cpi-auth.fullname" .) }}
          {{- $uiSvc := printf "%s-admin-ui" (include "cpi-auth.fullname" .) }}
          {{- $loginSvc := printf "%s-login-ui" (include "cpi-auth.fullname" .) }}
          # Login UI routes (SvelteKit — handles OAuth login/consent flow)
          {{- range list "/login" "/register" "/consent" "/device" "/verify-email" "/forgot-password" "/reset-password" "/error" "/_app" }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $loginSvc }}
                port:
                  number: 5053
          {{- end }}
          # Path-based tenant routing for the login UI: /t/{slug}/(login|...)
          # The login UI's reroute hook in hooks.server.ts strips the
          # /t/{slug}/ prefix internally so SvelteKit's router matches the
          # same Svelte page that handles the legacy non-prefixed URLs.
          - path: /t/[a-z0-9-]+/(login|register|consent|device|verify-email|forgot-password|reset-password|error|passwordless|mfa|webauthn|saml)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $loginSvc }}
                port:
                  number: 5053
          # Admin UI routes — must come BEFORE the /admin → core rule below
          # so they take precedence. The admin UI is mounted at /admin/ and
          # uses path patterns that don't collide with the admin API:
          #   /admin/login, /admin/system/*, /admin/t/*  → admin-ui (SPA)
          #   /admin/assets/*                            → admin-ui (Vite assets)
          #   /admin/                                    → admin-ui (root, redirects internally)
          - path: /admin/(login|system|t|assets|index\.html)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $uiSvc }}
                port:
                  number: 5054
          - path: /admin/$
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $uiSvc }}
                port:
                  number: 5054
          # API routes → Core backend
          {{- range list "/admin" "/oauth" "/.well-known" "/api" "/passwordless" "/mfa" "/webauthn" "/saml" }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          {{- end }}
          # Path-based tenant routing for the core API: /t/{slug}/(oauth|...)
          # The PathBasedTenantResolver wrapper in core strips the prefix and
          # sets the tenant in context, so chi routes /t/lastsoftware/oauth/
          # authorize through the existing /oauth/authorize handler.
          - path: /t/[a-z0-9-]+/(admin|oauth|\.well-known|api|health)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          # Fallback for any other /t/{...}/... path (invalid slug, or a
          # path neither the login-ui nor the core regex matched). Sending
          # it to core lets the PathBasedTenantResolver wrapper return a
          # proper 404 instead of falling through to the admin-ui SPA shell.
          - path: /t/
            pathType: Prefix
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ $coreSvc }}
                port:
                  number: 5050
          # Root: serve the admin UI shell. The SPA's BrowserRouter basename
          # is /admin so it'll redirect / → /admin/{system,t}/. Once a real
          # marketing landing page exists, this rule moves to that service.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $uiSvc }}
                port:
                  number: 5054
{{- end }}
