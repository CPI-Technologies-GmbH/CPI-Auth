server {
    listen 5054;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # The admin UI is served behind the ingress at /admin/ but the files
    # in the image are at the filesystem root. Strip the /admin/ prefix
    # before resolving so /admin/assets/foo.js → /assets/foo.js, and use
    # the SPA index fallback for any unknown sub-path so deep links like
    # /admin/t/lastsoftware/users still hand the URL off to React Router.
    # The ^~ modifier makes nginx pick this prefix over the regex below.
    location ^~ /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;

        # Cache hashed assets aggressively. Vite emits content-hashed
        # filenames so this is safe.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            rewrite ^/admin/(.*)$ /$1 break;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Cache static assets when accessed at the root (legacy / direct paths).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for any non-admin path — serves the same shell so React
    # Router (basename=/admin) can pick up and redirect to /admin/...
    location / {
        try_files $uri $uri/ /index.html;
    }
}
