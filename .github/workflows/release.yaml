name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Docker Images ──────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: .
            image: cpi-auth
            dockerfile: Dockerfile
          - context: ./login-ui
            image: cpi-auth-login-ui
            dockerfile: Dockerfile
          - context: ./admin-ui
            image: cpi-auth-admin-ui
            dockerfile: Dockerfile
          - context: ./account-ui
            image: cpi-auth-account-ui
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/cpi-technologies-gmbh/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=

  # ─── npm Packages ───────────────────────────────────
  npm-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: cd sdks/typescript && npm ci && npm run build
      - run: cd sdks/typescript && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-cli:
    name: Publish CLI to npm
    needs: npm-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: cd sdks/typescript && npm ci && npm run build
      - run: cd tools/cli && npm ci && npm run build
      - run: cd tools/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Helm Chart ─────────────────────────────────────
  helm:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/cpi-auth/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: $VERSION/" deploy/helm/cpi-auth/Chart.yaml
          helm package deploy/helm/cpi-auth -d .helm-packages

      - name: Push to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          mkdir -p charts
          cp .helm-packages/*.tgz charts/
          helm repo index charts --url https://cpi-technologies-gmbh.github.io/CPI-Auth/charts
          git add charts/
          git commit -m "Release Helm chart ${GITHUB_REF_NAME}"
          git push origin gh-pages

  # ─── GitHub Release ─────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
