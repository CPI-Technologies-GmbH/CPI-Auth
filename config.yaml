server:
  host: "0.0.0.0"
  port: 5050
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 15s

database:
  host: postgres
  port: 5432
  user: authforge
  password: authforge_secret
  name: authforge
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10

redis:
  host: redis
  port: 6379
  password: ""
  db: 0

nats:
  url: "nats://nats:4222"

smtp:
  host: mailhog
  port: 1025
  from: "noreply@cpi-auth.local"
  username: ""
  password: ""

security:
  jwt_signing_algorithm: RS256
  jwt_private_key_path: ""
  access_token_ttl: 3600
  refresh_token_ttl: 2592000
  encryption_key: "change-me-in-production-32bytes!"
  rate_limit_enabled: true
  rate_limit_requests_per_sec: 100
  cors_allowed_origins:
    - "http://localhost:5050"
    - "http://localhost:5053"
    - "http://localhost:5054"
    - "http://localhost:5055"
  csp_header: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:*"

logging:
  level: info
  format: json

metrics:
  enabled: true
  path: /metrics

webauthn:
  rp_display_name: "CPI Auth"
  rp_id: "localhost"
  rp_origins:
    - "http://localhost:5053"
    - "http://localhost:5055"
