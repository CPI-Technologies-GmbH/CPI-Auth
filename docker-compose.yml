version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cpi-auth-postgres
    restart: unless-stopped
    ports:
      - "5052:5432"
    environment:
      POSTGRES_DB: authforge
      POSTGRES_USER: authforge
      POSTGRES_PASSWORD: authforge_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.up.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./migrations/002_seed_data.up.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authforge -d authforge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cpi-auth-net

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cpi-auth-redis
    restart: unless-stopped
    ports:
      - "5056:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cpi-auth-net

  # ─── NATS ─────────────────────────────────────────────────
  nats:
    image: nats:2-alpine
    container_name: cpi-auth-nats
    restart: unless-stopped
    ports:
      - "5057:4222"
      - "5058:8222"
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cpi-auth-net

  # ─── MailHog (Dev Email) ──────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cpi-auth-mailhog
    restart: unless-stopped
    ports:
      - "5059:8025"
      - "5060:1025"
    networks:
      - cpi-auth-net

  # ─── CPI Auth Core (Go Backend) ──────────────────────────
  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpi-auth-core
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      AF_SERVER_HOST: "0.0.0.0"
      AF_SERVER_PORT: "5050"
      AF_DATABASE_HOST: postgres
      AF_DATABASE_PORT: "5432"
      AF_DATABASE_USER: authforge
      AF_DATABASE_PASSWORD: authforge_secret
      AF_DATABASE_NAME: authforge
      AF_DATABASE_SSLMODE: disable
      AF_REDIS_HOST: redis
      AF_REDIS_PORT: "6379"
      AF_NATS_URL: "nats://nats:4222"
      AF_SMTP_HOST: mailhog
      AF_SMTP_PORT: "1025"
      AF_SMTP_FROM: "noreply@cpi-auth.local"
      AF_SECURITY_ENCRYPTION_KEY: "change-me-in-production-32bytes!"
      AF_SECURITY_JWT_SIGNING_ALGORITHM: RS256
      AF_SECURITY_RATE_LIMIT_ENABLED: "true"
      AF_SECURITY_RATE_LIMIT_REQUESTS_PER_SEC: "100"
      AF_LOGGING_LEVEL: info
      AF_METRICS_ENABLED: "true"
      AF_WEBAUTHN_RP_DISPLAY_NAME: "CPI Auth"
      AF_WEBAUTHN_RP_ID: "localhost"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cpi-auth-net

  # ─── Login UI (SvelteKit) ────────────────────────────────
  login-ui:
    build:
      context: ./login-ui
      dockerfile: Dockerfile
    container_name: cpi-auth-login-ui
    restart: unless-stopped
    ports:
      - "5053:5053"
    environment:
      PUBLIC_API_URL: http://core:5050
      PORT: "5053"
      ORIGIN: http://localhost:5053
      NODE_ENV: production
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5053/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cpi-auth-net

  # ─── Admin Console (React + Nginx) ───────────────────────
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5050
    container_name: cpi-auth-admin-ui
    restart: unless-stopped
    ports:
      - "5054:5054"
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5054"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cpi-auth-net

  # ─── Account Portal (SvelteKit) ──────────────────────────
  account-ui:
    build:
      context: ./account-ui
      dockerfile: Dockerfile
    container_name: cpi-auth-account-ui
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      PUBLIC_API_URL: http://core:5050
      PUBLIC_LOGIN_URL: http://localhost:5053/login
      PORT: "5055"
      NODE_ENV: production
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:5055/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cpi-auth-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local

networks:
  cpi-auth-net:
    driver: bridge
    name: cpi-auth-network
